# Единая точка входа HTTP для фронта и pgAdmin. Backend — только после раскомментирования upstream и location.

upstream backend_api {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Статика фронта (форма заявки и т.д.)
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # API — прокси на backend (порт 8000 не публикуется на хост, только внутри compose)
    location = /api/admins {
        if ($http_authorization = "") {
            return 403;
        }
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/admins/ {
        if ($http_authorization = "") {
            return 403;
        }
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger / ReDoc / схема OpenAPI закрыты снаружи.
    location /docs {
        return 404;
    }
    location /redoc {
        return 404;
    }
    location = /openapi.json {
        return 404;
    }

    # pgAdmin отключен.
    location = /pgadmin {
        return 404;
    }
    location /pgadmin/ {
        return 404;
    }
}
