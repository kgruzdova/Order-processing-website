# Контур: только Nginx и Registry слушают хост; Postgres, pgAdmin, backend — только внутри сети compose.
# Скопируйте .env.example в .env и задайте пароли.
# Перед первым запуском Registry: ./scripts/init-registry-auth.sh
#
# Registry по HTTP: на клиентской машине в /etc/docker/daemon.json добавьте "insecure-registries":["HOST:5000"]
# и перезапустите Docker, либо включите TLS у registry (см. volumes REGISTRY_HTTP_TLS_* ниже) или положите
# сертификаты за отдельным reverse proxy с HTTPS.
#
# Авторизация docker login / docker push: пользователи и пароли задаются ТОЛЬКО в registry/auth/htpasswd
# (скрипт scripts/init-registry-auth.sh или htpasswd -B). Это не логин от hub.docker.com — клиент сохраняет
# учётные данные отдельно для каждого адреса registry (см. ~/.docker/config.json на вашей машине).

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "443:443"  # при TLS: раскомментируйте и подключите сертификаты в nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - pgadmin
    networks:
      - autello_net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задайте POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autello_net
    # Порт 5432 не публикуется — доступ только с backend/pgAdmin внутри контура.

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      # pgAdmin 8 строго валидирует email: *.local и часть «псевдо-доменов» отклоняются — см. .env.example
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?Задайте PGADMIN_DEFAULT_PASSWORD в .env}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
      # Работа за reverse proxy по пути /pgadmin/
      PGADMIN_SCRIPT_NAME: "/pgadmin"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autello_net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ---------------------------------------------------------------------------
  # Backend (раскомментируйте, когда будет образ)
  # Сборка/пуш в локальный registry, затем:
  #   image: ${REGISTRY_PUBLIC_HOST:-localhost}:5000/autello/backend:latest
  # ---------------------------------------------------------------------------
  # backend:
  #   image: ${REGISTRY_PUBLIC_HOST:-localhost}:5000/autello/backend:latest
  #   # build:
  #   #   context: ./backend
  #   # dockerfile: Dockerfile
  #   restart: unless-stopped
  #   env_file: .env
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-autello}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autello}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - autello_net
  #   # Без ports: — снаружи только через Nginx (location /api/)
  #   labels:
  #     - "com.centurylinklabs.watchtower.enable=true"

  registry:
    image: registry:2
    restart: unless-stopped
    environment:
      # Слушать все интерфейсы внутри контейнера (снаружи — проброс порта ниже на 0.0.0.0)
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Autello Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      # Для HTTPS напрямую у registry положите сертификаты и раскомментируйте:
      # REGISTRY_HTTP_TLS_CERTIFICATE: /certs/fullchain.pem
      # REGISTRY_HTTP_TLS_KEY: /certs/privkey.pem
    volumes:
      - registry_data:/var/lib/registry
      - ./registry/auth:/auth:ro
      # - ./registry/certs:/certs:ro
    ports:
      # Внешний доступ с любой сети: с локальной машины — docker login <публичный_IP_или_домен>:<порт>
      # Откройте порт в фаерволе/облачной группе безопасности (например ufw allow 5000/tcp).
      - "0.0.0.0:${REGISTRY_PORT:-5000}:5000"
    networks:
      - autello_net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      TZ: ${TZ:-UTC}
    networks:
      - autello_net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  autello_net:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  registry_data:
